[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION          = "20"
  NPM_FLAGS             = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from   = "/sitemap.xml"
  to     = "/api/sitemap"
  status = 200
